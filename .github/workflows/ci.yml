name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test + doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # grass_mpi's default feature `mpi_backend` links libmpi, so the
      # workspace build needs an MPI implementation present at compile time
      # even when no MPI example is being run.
      - name: Install OpenMPI
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy (workspace, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build (workspace, all targets)
        run: cargo build --workspace --all-targets

      - name: cargo test (workspace)
        run: cargo test --workspace

      # Verify the MPI two-binary example builds. We intentionally don't
      # run it under mpirun in CI — that requires a working OpenMPI launcher
      # and adds flakiness for little gain over a build check.
      - name: cargo build --features mpi (MPI examples)
        run: cargo build --features mpi --example explicit_mpmd_mpi_a --example explicit_mpmd_mpi_b

      - name: cargo doc (broken intra-doc links = error)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
