# IO demo — runs a single damped oscillator, prints a term_out line
# every 10 steps, and dumps the state to JSON every 50 steps.
#
# Try:
#   cargo run --example io -- examples/io/main.toml
#
# Or, to dump a starter config built from every plugin's defaults:
#   cargo run --example io -- --generate-config

[output]
# Relative dump paths resolve against this directory.
dir = "examples/io/out"

[run]
# Total simulation steps before the App stops.
steps = 200

[oscillator]
# Initial state.
x0 = 1.0
v0 = 0.0
# Material parameters (no coupling — this is a single oscillator).
k_self = 1.0
gamma = 0.05
mass = 1.0
dt = 5.0e-3

[clock]
start_step = 0
start_time = 0.0

[term_out]
# Print every N steps. Header prints once on first hit.
every = 10
columns = ["step", "time", "x", "v", "energy"]
width = 14

[dump]
# Write every N steps. 0 disables.
interval = 50
path_template = "frame_{step:06}.json"
